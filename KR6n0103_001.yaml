body:
  text: 天親菩薩造唐三藏法師玄奘奉詔譯明憨山沙門德清述佛説一大藏教只是説破三界唯心萬法唯識及佛滅後弘法菩薩解釋教義依唯心立性宗依唯識立相宗各竪門庭甚至分河飲水而性相二宗不能融通非今日矣唯馬鳴大師作起信論會相歸性以顯一心迷悟差別依一心法立二種門謂心真如門心生滅門良以寂滅一心不屬迷悟體絶聖凡今有聖凡二路者是由一心真妄迷悟之分故以二門為聖凡之本故立真如門顯不迷之體立生滅門顯一心有隨緣染淨之用故知一切聖凡修證迷悟因果皆生滅門收其末後拈華為教外別傳之旨乃直指一心本非迷悟不屬聖凡今達磨所傳禪宗是也其教中修行原依一心開示其所證入依生滅門悟至真如門以為極則其唯識所説十種真如正是對生滅所立之真如耳是知相宗唯識定要會歸一心為極此唯楞嚴所説一路涅槃門乃二宗之究竟也學人不知其源至談唯識一宗專在名相上作活計不知聖人密意要人識破妄相以會歸一心耳故今依生滅門中以不生滅與生滅和合成阿賴耶識變起根身器界以示迷悟之源了此歸源無二則妙悟一心如指諸掌矣相宗百法者正的示萬法唯識之旨也以不生滅心與生滅和合成阿賴耶識以此識有覺不覺義其覺義者乃一心真如為一切衆生正因佛性其不覺義者乃根本無明迷此一心而成識體故此識有三分謂自證分見分相分又一師立四分增證自證分其證自證分即不迷之真如其自證分乃真如一分迷中之佛性是為本覺以衆生雖迷而本有佛性不失不壞以有真如自體可證故云自證良由一心真如有大智慧光明義故今迷而為識以湛寂之體忽生一念迷本圓明則將本有無相之真如變起虗空四大之妄相名為相分將本有之智光變為能見之妄見是為見分是知一切衆生世界有相之萬法皆依八識見相二分之所建立故云萬法唯識此實相宗之本源也今唯識宗但言百法者始因彌勒菩薩修唯識觀見得萬法廣博鈍根衆生難以修習故就萬法中最切要者特出六百六十法造瑜伽師地論以發明之可謂簡矣及至天親菩薩從兜率稟受彌勒相宗法門又見其繁乃就六百六十法中提出綱要總成百法已盡大乘奧義故造論曰百法明門謂明此百法可入大乘之門矣故欲知唯識要先明此百法以此百法乃八識所變耳以一切衆生皆依此識而有生死三乘聖人皆依此識而有修證通名世出世法即此百法收盡然一切聖凡皆執為我故論首標云如世尊言一切法無我即顯此一無字便見世尊出世説法四十九年單單只説破聖凡之我見耳我見既離則八識無名而一心之義顯矣由是觀之何相而不歸性耶今言百法通名有為無為世出世法其世間名有為法有九十四出世間名無為法有六種故一切兩字包括殆盡雖云出世猶未離我故總無之所以論主標一切法無我一句為性相之宗本則了無剩法矣其有為法九十四者謂一心法有八心所法有五十一色法有十一不相應行法有二十四然心法八者謂眼識耳識鼻識舌識身識意識第七末那識亦名意亦名染淨依俗呼傳送識第八阿賴耶識亦名無沒識又名含藏識此八識通名心王以第八識乃自證分為生死主其前七識乃屬見分以為心用故楞嚴云元以一精明分成六和合八識心王無善無惡不會造業其作善作惡者乃心所也故五十一心所又名心使如世人家之奴僕主人固善而奴僕作惡纍及主耳起信論中不分王所但竪説三細六粗生起之相通名五意六種染心但云心念法異一語而已然心即八識心王念即心所法即善惡境界此唯識相宗乃橫説八識王所業用故不同耳其五十一心所分為六位一遍行五法謂意觸受想思二別境五法謂欲解念定慧三善心所有十一謂信進與慚愧無貪等三根輕安不放逸行捨及不害四根本煩惱有六謂貪嗔癡慢疑不正見五隨煩惱二十分小中大小隨有十者謂忿恨惱覆誑諂驕害嫉慳中隨二者謂無慚并無愧大隨八者謂不信并懈怠放逸及昏沉掉舉失正念不正知散亂所言隨者乃隨其根本煩惱分位差別分小中大者以有三義一自類俱起二遍染二性謂不善有覆三遍諸染心三義皆具名大具一名中俱無名小六不定法四者謂悔眠尋伺以此四法不定屬善屬惡故此五十一心所皆作善作惡之具也而有粗細之不同遍行五者乃善惡最初之動念也雖有五法其實總成一念以第八識元一精明之體本無善惡二路其前五識乃八識精明應五根照境之用同一現量亦無善惡其六七二識正屬八識之見分其七乃虗假故楞伽云七識不流轉非生死因其六識元屬智照今在迷中雖善分別況是待緣亦本無善惡若無遍行五法則一念不生智光圓滿現量昭然即此名為大定六根任運無為矣無奈八識田中含藏無量劫來善惡業習種子內熏鼓發不覺動念譬如潛淵魚鼓波而自踊是為作意警心令起不論善惡但只熏動起念處便是作意此生心動念之始也由衆生無始以來未嘗離念故今參禪看話頭堵截意識不行便是不容作意耳觸則引心趣境蓋境有二其習氣內熏者乃無明因緣所變為境發出現行則以比似量所緣前塵影子為境二境返觸自心故名為觸此妄境一現則違順俱非境相含受不捨是名為受境風飄鼓安立自境施設名言故名為想微細不斷驅役自心令造善惡故名為思其實五法圓滿方成微細善惡總為一念此最極微細故云流注生滅言遍行者謂遍四一切心得行故謂遍三性八識九地一切時也是為恆行心所參禪只要斷此一念若離此一念即是真心故起信云離念境界唯證相應故別境五者正是作善作惡之心也前遍行五雖起一念善惡但念而未作若肯當下止息則業行自消及至別境則不能止矣言別境者謂別別緣境不同遍行此乃作業之心耳因前遍行作後善惡體通粗細欲者樂欲謂於所樂境希望欲作此正必作之心也解者勝解謂於境決定知其可作不能已也念者明記謂於可作境令心分明記取不忘也定專一謂於所觀境專注一心也慧黠慧謂於所作境了然不疑也此五別別緣境而生若無此五縱有善惡之念亦不能作成事業而此五法不唯善惡即出世修行亦須此五乃能成辨也上乃起業之心下乃造作之業其業不過善惡二途其善業止有十一其惡業則有根本煩惱六隨煩惱二十故世間衆生作善者少而作惡者多也善十一者善謂信慚愧無貪等三根勤安不放逸行捨及不害此十一法收盡一切善業世出世業以信為本故首列之慚者謂自慚云我如此丈夫之形又解教法敢作惡耶有此慚心則惡行自止愧者愧他謂恐人譏呵故不親惡人不作惡事經云有慚愧者可名為人既具信心加增慚愧則善法自成矣貪嗔癡三者乃根本煩惱亦名三毒作善之人此三不斷何以為善故皆無之若無此三毒是為三善根勤者精進也既斷三毒純一善心必加精進勇猛善行方增此治懈怠之病世有淳善之人無精進力軟暖因循故終身無成輕安者謂離三毒粗重昏懵如釋重負則身心輕快安隱堪任善行也不放逸者以縱貪嗔癡無精進心是為放逸此不放逸乃三根精進四法上防修之功能也行捨者由精進力捨貪嗔癡則令心平等正直任運入道以念念捨處即念念入處如人行路不捨前步則後步不進故名行捨以有此捨令心不沉掉故平等耳言行蘊中捨者以行陰念念遷流者乃三毒習氣熏發妄想不覺令心昏沉掉舉若無此捨不但昏掉將發現行若能念念捨之則昏掉兩捨自然令心平等正直矣初用力捨名有功用若捨至一念不生則任運無功自然合道矣故豫教人參禪做工夫但妄想起時莫與作對亦不要斷亦不可隨但撇去不顧自然心安蓋撇即捨耳不害者謂慈愍衆生不為損惱此專治嗔不嗔則外不傷生內全慧命故為至善如儒之仁而善法繫之終焉根本煩惱六者謂貪嗔癡慢疑不正見此六煩惱乃二種我法之根本為二種生死之根本一切枝末從此而生然貪嗔癡名為三毒傷害法身斷慧命者唯此為甚故首標之慢乃我慢疑乃不信不正見即邪見此三法障道之本慢障無我疑障正信不正見障正知見三乘能斷三毒而不能斷此三法外道之執邪見更甚所以修行難入正行者此三煩惱之過也法華名為十使煩惱謂貪嗔癡慢疑為五鈍使不正見分五謂身見邊見邪見戒取戒禁取為五利使由此煩惱能使衆生漂流苦海故名為使隨煩惱二十者謂忿恨惱覆誑諂驕害嫉慳此十為小隨無慚無愧此二為中隨不信懈怠放逸昏沉掉舉失正念不正知散亂此八為大隨所言隨者以隨他根本煩惱而生故言小中大者以隨有三義謂自類俱起遍染二性謂不善有覆遍諸染心具三名大具一名中大小俱起故行相粗猛各自為主故名小隨以忿等十法各別而起故其無慚無愧則一切不善心俱大小俱起名中由無慚愧則昏掉不信等一齊俱起故名為大蓋無慚愧及不信等與上善法相返義相對照可知不必繁解要知請詳唯識不定四者謂悔眠尋伺論曰不定謂悔眠尋伺二各二謂此二二各具善惡二法故不定於一以不同前五位心所定遍八識三性一切時一切地此心所之差別也悔不定者如作惡之人改悔為善悔前惡行如作惡之人悔前惡事不作故不定耳眠謂睡眠則令身不自在心極暗昧此非善惡故名不定即眠中作夢亦不定善惡論説眠能障觀以眠為心所者能令身心昏重之用但非一定善惡耳言尋伺者乃作善作惡之心將作之時必返求於心意言籌量粗轉為尋入細為伺所謂粗細發言言不定者如讚佛菩薩初尋後伺方得妙辭如刁訟之人亦由尋入伺方得成算故此二法為不定耳如上五十一法名心所者乃心家所有之法也然八識心王不會造業其造業者乃心所為之以此與心相應故同時起耳此心所法又名心數亦名心迹亦名心路謂心行處總名妄想又名客塵又名染心又名煩惱煩者擾也惱者亂也有此心所擾亂自心然清淨心中本無此事如清冷水投以沙土則土失留礙水亡清潔自然渾濁名煩惱濁今修行人專要斷此煩惱方為真修楞嚴經云如澄濁水沙土自沉清水現前名為初伏客塵煩惱去泥純水名為永斷根本無明故修行人縱得禪定未斷煩惱但名清水現前而沙土沉底攪之又濁況未得禪定而便自為悟道乎如阿難蒙佛開示如來藏性徹底分明而自述所悟但曰心迹圓明以向來都是妄想用事全不知不見今日乃見此是煩惱方得圓明了了耳今人以妄想為悟心豈非自顢耶然此心所名雖相宗要人識破此妄想相則容易妙悟本有真心矣豈直專數名相而已哉已上雖分王所總屬八識之見分十一色法者謂眼耳鼻舌身五根色聲香味觸法六塵此五根乃八識攬地水火風四大所成內身為識所依之根五塵亦是四大能所八法所造為所受用境其法塵乃外五塵落謝影子屬六識所變一半屬心一半屬境此十一法通屬八識相分境以唯識所現故問曰此五根身乃衆生之內身言攬四大所成此義云何答曰楞嚴經云迷妄有虗空依空立世界想澄成國土知覺乃衆生此言因迷一心轉成阿賴耶識則靈明真空變為頑空於頑空中無明凝結成四大妄色故云依空立世界乃妄想澄凝所成之國土耳由有四大妄色則本有之智光轉為妄見以彼妄色為所見之境妄見既久則搏取四大少分為我而妄見托彼四大以為我身故四大本是無知因妄見執受而有知真心無量今被無明封固潛入四大以為心所謂色雜妄想想相為身故云知覺乃衆生是為五蘊之衆生耳故內五根外六塵通屬八識之相分故參禪必先內脫身心外遺世界者正要泯此相見二分單究八識無明本體故身心世界不消總是生死之障礙耳所言分別我法二執者以執身為我執根塵為法執二乘修行但破身見則出分段生死其分別法執從初信心歷三賢位直至初地方破此執豈易易哉二十四種不相應者此乃色心分位蓋依前三法上一分一位假立得等之名揀非心心所色等故名不相應以不與心王相應以不能作善作惡故非心所但係唯識所計分位差別以是我所執之法故亦列在有為法數義有多解非所急務故不必一一恐妨正行耳此上九十四種名有為法以是衆生生死之法乃妄識所計有造作故故名有為名世間法下六無為乃出世法無為法有六種者謂虗空無為擇滅無為非擇滅無為不動無為受想滅無為真如無為此六種法揀異有為故立無為名雖云出世法實通小乘以不動乃三果那含受想滅乃滅盡定耳虗空無為者從喻得名謂無為法體若虗空無所造作下五無為通以此喻然此虛空喻有大小不同如華嚴云若人欲識佛境界當淨其意如虗空遠離妄想及諸取令心所向皆無礙又云清淨法身猶若虗空此則直指法界性空即起信所云如實空鏡以體絶妄染故如虗空此乃大乘法性真空實一心之別稱也此中虗空義通大小正取虗豁無有造作以作下五無為真諦之喻耳擇滅無為者擇謂揀擇滅謂斷滅由無漏智斷諸障染所顯真理故立斯名此在權教菩薩分斷分證及二乘所證涅槃空法正屬擇滅故曰證滅高證無為實在二乘非擇滅者謂不由擇力緣缺所顯即實教菩薩以如實觀觀諸法性本自寂滅以立此名不動無為者謂第四禪離前三定三災不至無喜樂等動搖身心得不動名即五那含定受想滅無為者無所有處想受不行名受想滅無為通滅盡定此與不動皆屬二乘真如無為者理非倒妄不妄不變名為真如以遠離依他遍計此正唯識所證十種真如若依起信正是八識體中本覺及真如門乃對生滅之真如未盡一心故是相宗之極則此上百法乃總答云何一切法也下答云何為無我言無我者略有二種一補特伽羅無我二法無我此二無我直顯一心之源也蓋我法二執有粗有細粗者名分別我法二執細者名俱生我法二執此二種執始從凡夫外道二乘歷三賢十聖直至等覺方才破盡破此二執即證一心是名為佛今此二無我則粗細二執皆在此中言補特伽羅云數取趣謂諸有情數數起惑造業名為能取當來五趣名為所取此蓋就凡夫所執分別五蘊假我及外道所執之神我以取分段生死之苦者而言也其實二乘所執蘊即離我及涅槃我與地上菩薩未破藏識七地已前俱未離俱生我執以取變易生死之微苦者今論中但説凡夫分別之我未及聖人蓋就相宗一往所談耳其實佛意以聖教量盡皆破之方極大乘之義也法無我者謂我所執之法也凡夫法執即身心世界六塵依報外道所執妄想涅槃二乘所執偏空涅槃菩薩所執取證真如論云現前立少物謂是唯識性以有所得故非實住唯識以有證得是為微細法執所謂存我覺我俱名障礙故八地菩薩已證平等真如尚起貪著是謂微細法執此執未空故未盡異熟尚屬因果直至金剛道後異熟空時即入果海即起信云菩薩地盡覺心初起心無初相遠離微細念故得見心性名究竟覺是則按此百法前九十四乃凡夫所執人法二我六種無為乃二乘菩薩所執人法二我以雖證真如猶屬迷悟對待總屬生滅邊收故今生滅情忘聖凡不立方極一心之源故皆無之此實即相歸性之極則也嗟今學者但只分別名相不達即相即性歸源之旨致使聖教不明而有志參禪者欲得正修行路可不敬哉
